<body>
    <div class="container">
        <div class="display-wrapper">
            <div id="display" class="digital-clock">00:00</div>
        </div>
        
        <div class="controls">
            <button onclick="handleStartRestart()" class="btn-restart">開始 / 重新開始</button>
            
            <div class="bottom-btns">
                <button onclick="changeTime(15)" class="btn-adjust">+15s</button>
                <button onclick="changeTime(-15)" class="btn-adjust">-15s</button>
            </div>
        </div>
    </div>

    <audio id="beep-short" src="beep.mp3" preload="auto"></audio>
    <audio id="beep-long" src="timesup.mp3" preload="auto"></audio>
</body>
